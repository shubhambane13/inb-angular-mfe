<div class="container-fluid p-4">
  <h2 class="text-primary mb-4">Account Statements</h2>

  <mat-card class="mb-4 mat-elevation-z2">
    <mat-card-content>
      <form [formGroup]="statementForm" class="row align-items-center">
        
        <mat-form-field appearance="outline" class="col-md-3">
          <mat-label>Select Account</mat-label>
          <mat-select formControlName="accountNumber">
            <mat-option *ngFor="let acc of accounts" [value]="acc.id">
              {{ acc.accountNumber }} ({{ acc.accountType }})
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="col-md-4">
          <mat-label>Enter a date range</mat-label>
          <mat-date-range-input [rangePicker]="picker">
            <input matStartDate formControlName="startDate" placeholder="Start date">
            <input matEndDate formControlName="endDate" placeholder="End date">
          </mat-date-range-input>
          <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-date-range-picker #picker></mat-date-range-picker>
        </mat-form-field>

        <div class="col-md-2 text-end">
          <button mat-raised-button color="primary" type="submit" (click)="getGrid()" [disabled]="statementForm.invalid">
            <mat-icon>search</mat-icon> Fetch
          </button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card class="mat-elevation-z2" *ngIf="tableData.data.length > 0">
    <mat-card-content class="p-0">

      <app-global-table
        [tableData]="tableData"
        [columnList]="tableConfig"
        [pageSize]="pageSize"
        [pageIndex]="pageIndex"
        (onSortChange)="onSortChange($event)"
        (onPageChange)="onPageChange($event)"

    </mat-card-content>
  </mat-card>

  <div class="text-center mt-5 text-muted" *ngIf="tableData.data.length === 0">
    <mat-icon style="font-size: 48px; width: 48px; height: 48px;">receipt_long</mat-icon>
